spring.application.name=api-gateway
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stayhaven}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:stayhaven}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:stayhaven}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

stayhaven.auth.token-secret=${STAYHAVEN_AUTH_TOKEN_SECRET:local-development-token-secret-change-me}
stayhaven.auth.token-ttl-hours=${STAYHAVEN_AUTH_TOKEN_TTL_HOURS:12}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.tracing.sampling.probability=1.0

spring.cloud.gateway.server.webmvc.routes[0].id=notification-service
spring.cloud.gateway.server.webmvc.routes[0].uri=${NOTIFICATION_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/notifications/**
