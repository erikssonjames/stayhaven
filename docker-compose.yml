services:
  postgres:
    image: postgres:16-alpine
    container_name: stayhaven-postgres
    environment:
      POSTGRES_USER: stayhaven
      POSTGRES_PASSWORD: stayhaven
      POSTGRES_DB: stayhaven
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: stayhaven-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: stayhaven
      RABBITMQ_DEFAULT_PASS: stayhaven
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

volumes:
  postgres-data:
  rabbitmq-data: