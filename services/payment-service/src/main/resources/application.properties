spring.application.name=payment-service
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stayhaven}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:stayhaven}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:stayhaven}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:stayhaven}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:stayhaven}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.tracing.sampling.probability=1.0
